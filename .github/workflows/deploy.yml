# .github/workflows/deploy.yml
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ── initialize ──────────────────────────────────────────────
      - name: Initialize — validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LOCAL_API_URL: ${{ secrets.NEXT_PUBLIC_LOCAL_API_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.NEXT_PUBLIC_ENVIRONMENT }}
          NEXT_PUBLIC_NAVER_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_ID }}
          NEXT_PUBLIC_NAVER_CALLBACK_URL: ${{ secrets.NEXT_PUBLIC_NAVER_CALLBACK_URL }}
          NEXT_PUBLIC_STATE_STRING: ${{ secrets.NEXT_PUBLIC_STATE_STRING }}
          NEXT_PUBLIC_FIREBASE_SERVICE_ACCOUNT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_SERVICE_ACCOUNT_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          NEXT_PUBLIC_DEFAULT_PASSWORD: ${{ secrets.NEXT_PUBLIC_DEFAULT_PASSWORD }}
          NEXT_PUBLIC_KAKAO_REST_API_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_REST_API_KEY }}
          NEXT_PUBLIC_KAKAO_CALLBACK_URL: ${{ secrets.NEXT_PUBLIC_KAKAO_CALLBACK_URL }}
          NEXT_PUBLIC_VIEWER_SECRET: ${{ secrets.NEXT_PUBLIC_VIEWER_SECRET }}
        run: |
          MISSING=""
          for var in \
            EC2_HOST EC2_USER EC2_KEY EC2_PATH \
            DOCKERHUB_USERNAME DOCKERHUB_TOKEN \
            NEXT_PUBLIC_API_URL NEXT_PUBLIC_LOCAL_API_URL \
            NEXT_PUBLIC_ENVIRONMENT NEXT_PUBLIC_NAVER_CLIENT_ID \
            NEXT_PUBLIC_NAVER_CALLBACK_URL NEXT_PUBLIC_STATE_STRING \
            NEXT_PUBLIC_FIREBASE_SERVICE_ACCOUNT_ID NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID \
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY NEXT_PUBLIC_DEFAULT_PASSWORD \
            NEXT_PUBLIC_KAKAO_REST_API_KEY NEXT_PUBLIC_KAKAO_CALLBACK_URL NEXT_PUBLIC_VIEWER_SECRET; do
            [ -z "${!var}" ] && MISSING="${MISSING:+$MISSING }$var"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✓ All required secrets present"

      # ── build ───────────────────────────────────────────────────
      - name: Build — Docker image & push to Docker Hub
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/goldhand"
          SHA="${{ github.sha }}"

          printf '%s\n' "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_LOCAL_API_URL="${{ secrets.NEXT_PUBLIC_LOCAL_API_URL }}" \
            --build-arg NEXT_PUBLIC_ENVIRONMENT="${{ secrets.NEXT_PUBLIC_ENVIRONMENT }}" \
            --build-arg NEXT_PUBLIC_NAVER_CLIENT_ID="${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_NAVER_CALLBACK_URL="${{ secrets.NEXT_PUBLIC_NAVER_CALLBACK_URL }}" \
            --build-arg NEXT_PUBLIC_STATE_STRING="${{ secrets.NEXT_PUBLIC_STATE_STRING }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_SERVICE_ACCOUNT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_SERVICE_ACCOUNT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}" \
            --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY="${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_PASSWORD="${{ secrets.NEXT_PUBLIC_DEFAULT_PASSWORD }}" \
            --build-arg NEXT_PUBLIC_KAKAO_REST_API_KEY="${{ secrets.NEXT_PUBLIC_KAKAO_REST_API_KEY }}" \
            --build-arg NEXT_PUBLIC_KAKAO_CALLBACK_URL="${{ secrets.NEXT_PUBLIC_KAKAO_CALLBACK_URL }}" \
            --build-arg NEXT_PUBLIC_VIEWER_SECRET="${{ secrets.NEXT_PUBLIC_VIEWER_SECRET }}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$SHA" \
            -f docker/Dockerfile .

          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA"

      # ── deploy ──────────────────────────────────────────────────
      - name: Deploy — upload configs to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: 'docker-compose.yml,docker/nginx.conf,scripts/deploy.sh'
          target: '${{ secrets.EC2_PATH }}'

      - name: Deploy — execute on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd "${{ secrets.EC2_PATH }}"
            chmod +x scripts/deploy.sh
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
            export IMAGE_TAG="${{ github.sha }}"
            bash scripts/deploy.sh
